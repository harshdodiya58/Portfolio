<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dynamic Glowing Background -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="50%" stop-color="#9333EA" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
  </defs>
  
  <rect width="100" height="100" rx="25" fill="url(#grad1)" />
  
  <!-- Text Content "HD" -->
  <text x="50%" y="55%" font-family="'Inter', sans-serif" font-size="52px" font-weight="900" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" letter-spacing="-2">HD</text>
</svg>
