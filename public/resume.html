<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harsh Dodiya Resume</title>
    <meta name="description" content="Harsh Dodiya resume viewer" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --border: #e2e8f0;
        --accent1: #2563eb;
        --accent2: #7c3aed;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(37,99,235,0.12), transparent 34%),
          radial-gradient(circle at top right, rgba(124,58,237,0.12), transparent 28%),
          linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
        color: var(--text);
      }
      .shell {
        min-height: 100%;
        display: flex;
        flex-direction: column;
      }
      .topbar {
        position: sticky;
        top: 0;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1rem 1.25rem;
        background: rgba(255,255,255,0.82);
        backdrop-filter: blur(14px);
        border-bottom: 1px solid rgba(226,232,240,0.9);
      }
      .brand {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
      }
      .brand strong {
        font-size: 1rem;
        letter-spacing: 0.02em;
      }
      .brand span {
        font-size: 0.875rem;
        color: var(--muted);
      }
      .actions {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      .button {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1rem;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
        font-size: 0.95rem;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .button:hover { transform: translateY(-1px); }
      .button.primary {
        color: white;
        background: linear-gradient(90deg, var(--accent1), var(--accent2));
        box-shadow: 0 12px 24px rgba(37,99,235,0.22);
      }
      .button.secondary {
        color: var(--text);
        background: var(--card);
        border: 1px solid var(--border);
      }
      .frameWrap {
        flex: 1;
        padding: 1rem;
      }
      .frame {
        width: 100%;
        height: calc(100vh - 96px - 2rem);
        min-height: 700px;
        border: 1px solid var(--border);
        border-radius: 24px;
        overflow: hidden;
        background: var(--card);
        box-shadow: 0 24px 60px rgba(15,23,42,0.10);
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: white;
      }
      @media (max-width: 768px) {
        .topbar {
          flex-direction: column;
          align-items: flex-start;
        }
        .actions {
          width: 100%;
        }
        .button {
          flex: 1 1 100%;
          justify-content: center;
        }
        .frame {
          height: calc(100vh - 170px - 2rem);
          min-height: 520px;
          border-radius: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <strong>Harsh Dodiya Resume</strong>
          <span>View or download the latest resume</span>
        </div>
        <div class="actions">
          <a class="button secondary" href="/">
            Back to Portfolio
          </a>
          <a class="button primary" href="/resume.pdf" target="_blank" rel="noopener noreferrer">
            Open PDF
          </a>
        </div>
      </header>
      <main class="frameWrap">
        <div class="frame">
          <iframe src="/resume.pdf" title="Harsh Dodiya Resume"></iframe>
        </div>
      </main>
    </div>
  </body>
</html>
